name: Incident correction
description: Request a source correction, duplicate merge, classification update or takedown review
title: "Correction: "
labels:
  - data-correction
body:
  - type: markdown
    attributes:
      value: Do not include confidential, personal or legally privileged information. Public issues are visible to everyone.
  - type: input
    id: record-id
    attributes:
      label: Record ID
      description: Find this in the CSV export or source data.
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current statement
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Requested correction
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Public supporting source
      placeholder: https://
    validations:
      required: true
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have not included confidential or private personal information.
          required: true
