name: Daily PV fire discovery

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-incidents.yml"
      - ".openai/**"
      - "vite.config.ts"
      - "build/**"
      - "scripts/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
  schedule:
    - cron: "17 14 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-pv-fire-discovery
  cancel-in-progress: false

jobs:
  discover-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out repository without persisted credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies without package scripts
        run: npm ci --ignore-scripts

      - name: Discover public incident reports
        run: |
          set +e
          (
            set -e
            node scripts/update-incidents.mjs
            if ! node scripts/import-public-index.mjs 2> public-index-error.log; then
              cat public-index-error.log >&2
              node scripts/mark-public-index-degraded.mjs public-index-error.log
            fi
          ) > discovery.log 2>&1
          status=$?
          tail -n 100 discovery.log
          exit "$status"

      - name: Validate data and dashboard
        run: |
          set +e
          npm test > validation.log 2>&1
          status=$?
          tail -n 100 validation.log
          exit "$status"

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: daily-pv-fire-failure-logs
          path: |
            discovery.log
            validation.log
            public-index-error.log
          if-no-files-found: warn
          retention-days: 3

      - name: Package validated data only
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: daily-pv-fire-data
          if-no-files-found: error
          retention-days: 3
          path: |
            data/candidates.json
            data/indexed-reports.json
            data/pipeline-status.json

  propose-data-update:
    needs: discover-and-validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out protected base
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download validated data artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: daily-pv-fire-data
          path: incoming

      - name: Revalidate artifact allowlist and schema
        run: node scripts/validate-snapshot.mjs incoming

      - name: Prepare data-only change
        id: changes
        run: |
          cp incoming/candidates.json data/candidates.json
          cp incoming/indexed-reports.json data/indexed-reports.json
          cp incoming/pipeline-status.json data/pipeline-status.json
          if git diff --quiet -- data/candidates.json data/indexed-reports.json data/pipeline-status.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push bot branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "pv-fire-watch-bot"
          git config user.email "pv-fire-watch-bot@users.noreply.github.com"
          git switch -C automation/daily-pv-fire-data
          git add data/candidates.json data/indexed-reports.json data/pipeline-status.json
          git commit -m "data: daily PV fire discovery"
          git push --force origin HEAD:automation/daily-pv-fire-data

      - name: Open or update review pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          const status = JSON.parse(readFileSync("incoming/pipeline-status.json", "utf8"));
          const news = status.sources.find((source) => source.id === "multilingual-news") ?? {};
          const publicIndex = status.sources.find((source) => source.id === "public-report-index") ?? {};
          const body = [
            "Automated, validated data-only update from the daily PV fire discovery pipeline.",
            "",
            "Latest validated snapshot:",
            `- Status: ${status.overallStatus ?? "unknown"}`,
            `- Last successful check: ${status.lastSuccessfulCheckAt ?? "unknown"}`,
            `- Multilingual discovery: ${news.successfulQueries ?? 0}/${news.attemptedQueries ?? 0} queries succeeded (${news.failedQueries ?? 0} failed)`,
            `- Public-index reports: ${publicIndex.recordCount ?? 0}`,
            `- Pending discovery candidates: ${news.recordCount ?? 0}`,
            "- Production build, artifact checks, and test suite passed",
            "",
            "This pull request remains review-only; no automated merge is requested.",
          ].join("\n");
          writeFileSync("daily-pr-body.md", body + "\n");
          NODE

          pr_number="$(gh pr list --head automation/daily-pv-fire-data --state open --json number --jq '.[0].number // empty')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --body-file daily-pr-body.md
            echo "Existing daily-data pull request and validation summary updated."
          elif gh pr create --base main --head automation/daily-pv-fire-data --title "data: daily PV fire discovery" --body-file daily-pr-body.md; then
            echo "Daily-data pull request created."
          else
            echo "::warning::Repository policy prevented GitHub Actions from creating the pull request. The validated automation/daily-pv-fire-data branch was retained for review."
          fi

      - name: Write workflow summary
        if: always()
        run: |
          echo "## Global PV Fire Watch daily scan" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          if [ -f incoming/pipeline-status.json ]; then
            node -e "const s=require('./incoming/pipeline-status.json'); console.log(JSON.stringify({overallStatus:s.overallStatus,lastSuccessfulCheckAt:s.lastSuccessfulCheckAt,sources:s.sources.map(({id,status,recordCount,successfulQueries,failedQueries})=>({id,status,recordCount,successfulQueries,failedQueries}))},null,2))" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Validated pipeline status was not available." >> "$GITHUB_STEP_SUMMARY"
          fi
